<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Unblocked Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .score {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #333;
        }

        canvas {
            border: 3px solid #667eea;
            background: linear-gradient(to bottom, #87ceeb, #e0f6ff);
            border-radius: 10px;
            display: block;
            margin: 0 auto 20px;
        }

        .instructions {
            color: #666;
            margin: 15px 0;
            font-size: 0.95em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .reset-btn {
            background: #667eea;
            color: white;
        }

        .reset-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .home-btn {
            background: #999;
            color: white;
        }

        .home-btn:hover {
            background: #777;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐦 Flappy Bird</h1>
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="instructions">
            Click or Press SPACE to fly. Avoid the pipes!
        </div>
        <div class="button-group">
            <button class="reset-btn" onclick="resetGame()">New Game</button>
            <button class="home-btn" onclick="window.location.href='../'">Home</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const bird = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jump: -12
        };

        let pipes = [];
        let score = 0;
        let gameOver = false;
        const pipeWidth = 60;
        const pipeGap = 130;
        const pipeDistance = 200;

        function draw() {
            // Draw sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(1, '#e0f6ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bird
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width / 2, bird.y + bird.height / 2, bird.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // Draw bird eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width / 2 + 5, bird.y + bird.height / 2 - 5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Draw pipes
            ctx.fillStyle = '#2d5016';
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, canvas.height - pipe.topHeight - pipeGap);
            });
        }

        function update() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Check collision with ground/ceiling
            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                gameOver = true;
                alert('Game Over! Score: ' + score);
                resetGame();
                return;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= 5;
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                }

                // Check collision
                if (bird.x < pipe.x + pipeWidth &&
                    bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.topHeight || bird.y + bird.height > pipe.topHeight + pipeGap)) {
                    gameOver = true;
                    alert('Game Over! Score: ' + score);
                    resetGame();
                }
            });

            // Add new pipe
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - pipeDistance) {
                const topHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({ x: canvas.width, topHeight: topHeight });
            }
        }

        function gameLoop() {
            if (!gameOver) {
                update();
                draw();
            }
        }

        function flap() {
            bird.velocity = bird.jump;
        }

        function resetGame() {
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            draw();
        }

        document.addEventListener('click', flap);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                flap();
            }
        });

        resetGame();
        setInterval(gameLoop, 30);
    </script>
</body>
</html>
