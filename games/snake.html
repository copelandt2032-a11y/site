<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Unblocked Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .score {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #333;
        }

        canvas {
            border: 3px solid #667eea;
            background: #000;
            border-radius: 10px;
            display: block;
            margin: 0 auto 20px;
        }

        .instructions {
            color: #666;
            margin: 15px 0;
            font-size: 0.95em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .reset-btn {
            background: #667eea;
            color: white;
        }

        .reset-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .home-btn {
            background: #999;
            color: white;
        }

        .home-btn:hover {
            background: #777;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake</h1>
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="instructions">
            Use Arrow Keys or WASD to control the snake
        </div>
        <div class="button-group">
            <button class="reset-btn" onclick="resetGame()">New Game</button>
            <button class="home-btn" onclick="window.location.href='../'">Home</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let gameOver = false;

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = '#00ff00';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // Draw food
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        function update() {
            direction = nextDirection;

            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver = true;
                alert('Game Over! Final Score: ' + score);
                resetGame();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver = true;
                alert('Game Over! Final Score: ' + score);
                resetGame();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }
        }

        function gameLoop() {
            if (!gameOver) {
                update();
                draw();
            }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 15, y: 15};
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            draw();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'arrowup' || e.key.toLowerCase() === 'w') {
                if (direction.y === 0) nextDirection = {x: 0, y: -1};
            }
            if (e.key.toLowerCase() === 'arrowdown' || e.key.toLowerCase() === 's') {
                if (direction.y === 0) nextDirection = {x: 0, y: 1};
            }
            if (e.key.toLowerCase() === 'arrowleft' || e.key.toLowerCase() === 'a') {
                if (direction.x === 0) nextDirection = {x: -1, y: 0};
            }
            if (e.key.toLowerCase() === 'arrowright' || e.key.toLowerCase() === 'd') {
                if (direction.x === 0) nextDirection = {x: 1, y: 0};
            }
        });

        resetGame();
        setInterval(gameLoop, 100);
    </script>
</body>
</html>
